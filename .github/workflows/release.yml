name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/mesh-aws-linux-amd64 ./cmd
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/mesh-aws-darwin-amd64 ./cmd
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/mesh-aws-windows-amd64.exe ./cmd

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
